services:
  - type: web
    name: shuffle-cup
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn shufflecup.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shuffle-cup-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: shuffle-cup.onrender.com
databases:
  - name: shuffle-cup-db
    plan: free
