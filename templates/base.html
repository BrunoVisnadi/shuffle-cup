{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Shuffle Cup{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'tournament/style.css' %}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{% url 'home' %}"><span>SHUFFLE</span> CUP</a>
    <nav>
      <a href="{% url 'public_standings' %}">Standings</a>
      {% if user.is_authenticated %}<a href="{% url 'dashboard' %}">Manage</a><a href="/admin/">Admin</a>{% endif %}
    </nav>
  </header>
  <main class="container">
    {% for message in messages %}<div class="alert {{ message.tags }}">{{ message }}</div>{% endfor %}
    {% block content %}{% endblock %}
  </main>
  <footer>Shuffle Cup Tabulation</footer>
</body>
</html>
